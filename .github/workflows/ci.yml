name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4
    
    - name: Select Xcode 16 (Swift 6)
      run: sudo xcode-select -s /Applications/Xcode_16.0.app
      
    - name: Build Project
      run: swift build
      
    - name: Run Validation Suite (UAT)
      run: .build/arm64-apple-macosx/debug/UATRunner